services:
  tv-corporativa:
    build: .
    container_name: tv-corporativa
    ports:
      - "8080:8080"
    volumes:
      # Persistem entre reinícios: conteúdo, usuários/senha, sessão e uploads
      - ./data:/app/data
      - ./uploads:/app/uploads
      # Código ao vivo: alterações no admin/display aparecem só atualizando o navegador
      # (mudanças no backend exigem 'docker compose restart')
      - ./frontend:/app/frontend
      - ./backend:/app/backend
    environment:
      - TV_PORT=8080
    restart: unless-stopped
