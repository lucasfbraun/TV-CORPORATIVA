<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir senha – TV Corporativa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --brand-petrol:#0C3B38; --brand-teal:#0F7C70; --brand-lime:#76C043; --amber:#FFAB40;
  --blue-dark:#0C3B38; --blue-mid:#14534D; --blue-light:#0F7C70;
  --accent:#76C043; --green:#4caf50; --red:#e06c75;
  --white:#fff; --gray:#f0f4f8; --text:#2d3a4a; --dim:#7a8fa6;
}
body {
  font-family:'Roboto','Segoe UI',Arial,sans-serif;
  background:linear-gradient(135deg,var(--blue-dark),var(--blue-mid));
  color:var(--text); min-height:100vh;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.login-card {
  background:var(--white); border-radius:16px; padding:36px 32px;
  box-shadow:0 10px 40px rgba(0,0,0,.35); width:100%; max-width:380px;
}
h1 { font-size:18px;margin:8px 0 4px;color:var(--text);text-align:center; }
.subtitle { font-size:13px;color:var(--dim);margin-bottom:22px;text-align:center; }
.form-group { margin-bottom:16px; }
label { display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px; }
.form-input {
  width:100%;padding:11px 13px;border:1px solid #d4dde8;border-radius:9px;
  font-size:14px;transition:border .2s;
}
.form-input:focus { outline:none;border-color:var(--blue-light);box-shadow:0 0 0 3px rgba(46,117,182,.12); }
.btn-login {
  width:100%;padding:12px;background:var(--blue-light);color:#fff;border:none;
  border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;transition:background .2s;
}
.btn-login:hover { background:#0c655b; }
.btn-login:disabled { opacity:.6;cursor:default; }
.msg { border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:14px;display:none; }
.msg.err { background:#fdecea;color:#b5302a;border:1px solid #f5c2c0; }
.msg.ok  { background:#eaf7ec;color:#1f7a32;border:1px solid #b6e0bf; }
.brand-logo { text-align:center;margin-bottom:4px; }
.brand-logo img { width:200px;max-width:100%;height:auto; }
.brand-sub-center { text-align:center;font-size:11px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px; }
.hint { font-size:12px;color:var(--dim);text-align:center;margin-top:18px; }
.hint a { color:var(--blue-light);text-decoration:none;font-weight:600; }
</style>
</head>
<body>
  <form class="login-card" id="reset-form" onsubmit="return doReset(event)">
    <div class="brand-logo"><img src="/assets/logo.png" alt="Grupo Flexível"></div>
    <div class="brand-sub-center">TV Corporativa</div>
    <h1>Criar nova senha</h1>
    <div class="subtitle">Defina uma nova senha para o seu acesso.</div>

    <div class="msg err" id="err"></div>
    <div class="msg ok" id="ok"></div>

    <div id="form-fields">
      <div class="form-group">
        <label for="pass">Nova senha</label>
        <input class="form-input" id="pass" type="password" autocomplete="new-password" placeholder="Mínimo 6 caracteres" required>
      </div>
      <div class="form-group">
        <label for="pass2">Confirmar nova senha</label>
        <input class="form-input" id="pass2" type="password" autocomplete="new-password" required>
      </div>
      <button class="btn-login" id="btn" type="submit">Redefinir senha</button>
    </div>

    <div class="hint"><a href="/login">Voltar ao login</a></div>
  </form>

<script>
function qs(name){ return new URLSearchParams(location.search).get(name); }
const TOKEN = qs('token') || '';

if (!TOKEN) {
  document.getElementById('form-fields').style.display = 'none';
  const e = document.getElementById('err');
  e.textContent = 'Link inválido. Solicite uma nova redefinição na tela de login.';
  e.style.display = 'block';
}

async function doReset(e){
  e.preventDefault();
  const err = document.getElementById('err');
  const ok  = document.getElementById('ok');
  err.style.display = 'none'; ok.style.display = 'none';
  const p1 = document.getElementById('pass').value;
  const p2 = document.getElementById('pass2').value;
  if (p1.length < 6) { err.textContent = 'A senha deve ter ao menos 6 caracteres.'; err.style.display='block'; return false; }
  if (p1 !== p2)     { err.textContent = 'As senhas não conferem.'; err.style.display='block'; return false; }
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'Salvando...';
  try {
    const r = await fetch('/api/reset-password', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ token: TOKEN, new_password: p1 })
    });
    const data = await r.json();
    if (r.ok) {
      document.getElementById('form-fields').style.display = 'none';
      ok.innerHTML = 'Senha redefinida com sucesso! Você já pode <a href="/login">entrar</a>.';
      ok.style.display = 'block';
    } else {
      err.textContent = data.error || 'Não foi possível redefinir.';
      err.style.display = 'block';
    }
  } catch(ex) {
    err.textContent = 'Não foi possível conectar ao servidor.';
    err.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Redefinir senha';
  }
  return false;
}
</script>
</body>
</html>
